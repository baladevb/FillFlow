<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FillFlow</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
        <rect x="7" y="1" width="6" height="2" rx="1" fill="white" opacity="0.55"/>
        <rect x="7" y="4" width="6" height="2" rx="1" fill="white" opacity="0.55"/>
        <rect x="1" y="8" width="12" height="2" rx="1" fill="white" opacity="0.3"/>
        <rect x="1" y="11" width="9" height="2" rx="1" fill="white" opacity="0.3"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-name">FillFlow</div>
      <div class="header-sub" id="header-sub">Waiting…</div>
    </div>
  </div>

  <div class="status-card">
    <div class="status-top">
      <div class="pulse" id="pulse"></div>
      <span class="status-label" id="status-label">Waiting for run</span>
      <span class="dry-run-badge hidden" id="dry-run-badge">DRY RUN</span>
      <span class="status-val"   id="status-val"></span>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="row-display">
    <div class="row-big"   id="row-big">—</div>
    <div class="row-total" id="row-total">waiting to start</div>
  </div>

  <div class="layout-info">
    <div class="li-dot"></div>
    <span class="li-name" id="li-name">—</span>
    <span class="li-meta" id="li-meta"></span>
  </div>

  <!-- Live typing indicator -->
  <div class="typing-indicator hidden" id="typing-indicator">
    <div class="typing-label" id="typing-label">—</div>
    <div class="typing-value" id="typing-value">—</div>
  </div>

  <div class="msg-box hidden" id="msg-box"></div>

  <div class="controls" id="controls">
    <button class="ctrl-btn pause" id="pause-btn">⏸  Pause  (F9)</button>
    <button class="ctrl-btn stop"  id="stop-btn">■  Stop</button>
  </div>
  <div class="hint" id="hint">F9 to pause · ESC to emergency stop</div>

  <div class="done-msg hidden" id="done-msg">
    <div class="done-icon">✓</div>
    <div class="done-text">All rows completed</div>
  </div>

  <div class="log-section">
    <div class="log-title">Record log</div>
    <div id="log-list"></div>
  </div>


  <script src="sidepanel.js"></script>
</body>
</html>
